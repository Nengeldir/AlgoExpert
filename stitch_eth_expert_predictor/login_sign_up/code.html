<style>
        .eth-pattern {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>

<body class="bg-surface font-body-md text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Atmospheric Background Pattern -->
<div class="absolute inset-0 eth-pattern opacity-50 z-0 pointer-events-none"></div>
<!-- Abstract Geometric Accent -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-fixed-dim/30 blur-3xl opacity-60"></div>
<div class="absolute bottom-[10%] right-[5%] w-[40%] h-[40%] rounded-full bg-secondary-fixed/40 blur-3xl opacity-50"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Authentication Card -->
<div class="glass-panel border border-outline-variant rounded-xl shadow-lg flex flex-col overflow-hidden">
<!-- Card Header -->
<div class="bg-primary-container p-8 flex flex-col items-center justify-center border-b border-outline-variant relative overflow-hidden">
<!-- Decorative subtle grid on header -->
<div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(#ffffff 1px, transparent 1px), linear-gradient(90deg, #ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
<div class="relative z-10 flex flex-col items-center gap-4">
<!-- ETH Logo Placeholder -->
<div class="w-16 h-16 bg-on-primary rounded flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: &quot;FILL&quot; 1; font-size: 32px;">account_balance</span>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-on-primary mb-1">ETH Zurich</h1>
<h2 class="font-label-md text-label-md text-primary-fixed-dim uppercase tracking-widest">Expert Vote</h2>
</div>
</div>
</div>
<!-- Card Body -->
<div class="p-8 bg-surface-container-lowest">
<!-- Tabs -->
<div class="flex border-b border-outline-variant mb-8">
<button class="flex-1 pb-3 text-center font-label-md text-label-md text-primary border-b-2 border-primary focus:outline-none transition-colors">
                        Login
                    </button>
<button class="flex-1 pb-3 text-center font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
                        Sign-up
                    </button>
</div>
<!-- Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">ETH Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-on-surface transition-all outline-none" id="email" name="email" placeholder="username@ethz.ch" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-low border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-on-surface transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full py-4 mt-2 bg-primary text-on-primary font-label-md text-label-md rounded flex justify-center items-center gap-2 hover:bg-primary-container transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface" type="submit">
                        Enter Portal
                        <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<!-- Secure Context Indicator -->
<div class="mt-8 pt-6 border-t border-outline-variant flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 16px;">verified_user</span>
<span class="font-label-sm text-label-sm">Secure ETH Zurich Authentication</span>
</div>
</div>
</div>
</main>


</body></html>
